<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Days to Save the World — Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --parchment:    #f5ead0;
    --parchment-dk: #e8d5a3;
    --ink:          #2a1a0a;
    --ink-faded:    #5c3d20;
    --red:          #8b1a1a;
    --gold:         #b8860b;
    --gold-lt:      #d4a017;
    --green:        #3a5c2a;
    --blue:         #1a3a5c;
    --shadow:       rgba(42,26,10,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', serif;
    background: #1a0f05;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ─────────────────────────────────────── */
  .header {
    width: 100%;
    background: linear-gradient(180deg, #0d0702 0%, #1a0f05 100%);
    border-bottom: 2px solid var(--gold);
    padding: 18px 32px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Cinzel', serif;
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--gold-lt);
    text-transform: uppercase;
    white-space: nowrap;
  }
  .header-day {
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    color: var(--parchment-dk);
    letter-spacing: 0.08em;
  }
  .header-stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(184,134,11,0.12);
    border: 1px solid rgba(184,134,11,0.4);
    border-radius: 3px;
    padding: 4px 10px;
    font-size: 0.82rem;
    color: var(--parchment);
    letter-spacing: 0.05em;
  }
  .stat-icon { font-size: 0.95rem; }

  /* ── Legend ─────────────────────────────────────── */
  .legend {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 10px 24px;
    background: rgba(0,0,0,0.45);
    width: 100%;
    border-bottom: 1px solid rgba(184,134,11,0.25);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    color: var(--parchment-dk);
    letter-spacing: 0.04em;
    font-family: 'Cinzel', serif;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
  }

  /* ── Map Canvas ──────────────────────────────────── */
  .map-wrapper {
    width: 100%;
    max-width: 820px;
    padding: 32px 24px 60px;
    position: relative;
  }

  /* Central road spine */
  .road {
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 6px;
    transform: translateX(-50%);
    background: repeating-linear-gradient(
      to bottom,
      var(--parchment-dk) 0px,
      var(--parchment-dk) 18px,
      transparent 18px,
      transparent 28px
    );
    opacity: 0.25;
    pointer-events: none;
  }

  /* ── Milestone Bands ─────────────────────────────── */
  .region-label {
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.55;
    text-align: center;
    padding: 22px 0 8px;
    position: relative;
  }
  .region-label::before, .region-label::after {
    content: '';
    display: inline-block;
    width: 60px; height: 1px;
    background: var(--gold);
    opacity: 0.4;
    vertical-align: middle;
    margin: 0 10px;
  }

  /* ── Location Node ───────────────────────────────── */
  .loc-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    margin: 5px 0;
    position: relative;
    animation: fadeSlide 0.3s ease both;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* alternate left/right */
  .loc-row.left  { flex-direction: row; }
  .loc-row.right { flex-direction: row-reverse; }

  .loc-spacer { flex: 1; min-width: 0; }

  /* the connector line from node to spine */
  .loc-connector {
    width: 60px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-top: 18px;
  }
  .loc-connector::after {
    content: '';
    position: absolute;
    top: 26px;
    height: 2px;
    background: rgba(212,160,23,0.35);
    width: 100%;
  }
  .loc-row.left  .loc-connector::after { left: 0; }
  .loc-row.right .loc-connector::after { right: 0; }

  /* the dot on the road */
  .road-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(212,160,23,0.6);
    background: #1a0f05;
    flex-shrink: 0;
    margin-top: 18px;
    position: relative;
    z-index: 2;
  }

  /* the card */
  .loc-card {
    flex: 1;
    min-width: 0;
    max-width: 320px;
    background: linear-gradient(135deg, #2e1e08 0%, #1e1005 100%);
    border: 1px solid rgba(184,134,11,0.28);
    border-radius: 3px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  .loc-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(212,160,23,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .loc-card:hover {
    border-color: rgba(184,134,11,0.7);
    box-shadow: 0 4px 20px rgba(184,134,11,0.15);
    transform: translateY(-2px);
  }
  .loc-card.current {
    border-color: var(--gold-lt);
    box-shadow: 0 0 16px rgba(212,160,23,0.3), 0 0 4px rgba(212,160,23,0.5) inset;
  }
  .loc-card.current::after {
    content: '◀ YOU ARE HERE';
    position: absolute;
    top: 6px; right: 8px;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--gold-lt);
    opacity: 0.85;
  }
  .loc-card.visited {
    opacity: 0.65;
    border-color: rgba(184,134,11,0.15);
  }
  .loc-card.locked {
    opacity: 0.4;
    cursor: default;
  }
  .loc-card.locked:hover {
    transform: none;
    box-shadow: none;
    border-color: rgba(184,134,11,0.15);
  }

  .loc-id {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--gold);
    opacity: 0.6;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
  }
  .loc-name {
    font-family: 'Cinzel', serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--parchment);
    line-height: 1.25;
    margin-bottom: 5px;
  }
  .loc-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .badge {
    font-family: 'Cinzel', serif;
    font-size: 0.58rem;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 2px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .badge-town   { background: rgba(58,92,42,0.5);  border: 1px solid rgba(58,92,42,0.8);  color: #8fcc70; }
  .badge-shop   { background: rgba(26,58,92,0.5);  border: 1px solid rgba(26,58,92,0.9);  color: #70a8cc; }
  .badge-boss   { background: rgba(139,26,26,0.5); border: 1px solid rgba(139,26,26,0.9); color: #ff8080; }
  .badge-rest   { background: rgba(80,55,20,0.5);  border: 1px solid rgba(140,100,30,0.7); color: #d4a017; }
  .badge-recruit{ background: rgba(80,30,80,0.5);  border: 1px solid rgba(140,60,140,0.7); color: #cc88cc; }

  .loc-mobs {
    font-size: 0.76rem;
    color: var(--ink-faded);
    color: rgba(212,160,23,0.55);
    font-style: italic;
    line-height: 1.35;
  }

  /* ── Detail Panel (tooltip/drawer) ──────────────── */
  .detail-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, #1a0f05 0%, #0d0702 100%);
    border-top: 2px solid var(--gold);
    padding: 20px 28px 28px;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    z-index: 200;
    max-height: 55vh;
    overflow-y: auto;
  }
  .detail-panel.open { transform: translateY(0); }
  .detail-close {
    position: absolute;
    top: 14px; right: 18px;
    font-size: 1.2rem;
    color: var(--gold);
    cursor: pointer;
    background: none; border: none;
    font-family: 'Cinzel', serif;
    line-height: 1;
  }
  .detail-close:hover { color: var(--parchment); }
  .detail-id    { font-family:'Cinzel',serif; font-size:0.7rem; color:var(--gold); opacity:0.6; letter-spacing:0.12em; }
  .detail-name  { font-family:'Cinzel',serif; font-size:1.3rem; font-weight:700; color:var(--parchment); margin:4px 0 10px; }
  .detail-badges { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
  .detail-text  { font-size:1rem; color:#c8ae8a; line-height:1.65; font-style:italic; margin-bottom:12px; }
  .detail-random { font-size:0.88rem; color:rgba(200,174,138,0.6); line-height:1.5; padding:10px 14px; border-left:2px solid rgba(184,134,11,0.35); margin-bottom:10px; font-style:italic; }
  .detail-grid  { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:8px; margin-top:10px; }
  .detail-stat  { background:rgba(255,255,255,0.04); border:1px solid rgba(184,134,11,0.2); border-radius:3px; padding:6px 10px; }
  .detail-stat-label { font-family:'Cinzel',serif; font-size:0.6rem; letter-spacing:0.1em; color:var(--gold); opacity:0.7; text-transform:uppercase; margin-bottom:2px; }
  .detail-stat-val   { font-size:0.88rem; color:var(--parchment-dk); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #0d0702; }
  ::-webkit-scrollbar-thumb { background: rgba(184,134,11,0.4); border-radius: 3px; }

  /* ── Destination marker ──────────────────────────── */
  .dest-node {
    text-align: center;
    padding: 32px 0 20px;
    position: relative;
  }
  .dest-icon {
    font-size: 2rem;
    display: block;
    margin-bottom: 6px;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.7; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.1); }
  }
  .dest-name {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--red);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .dest-sub {
    font-size: 0.8rem;
    color: rgba(200,174,138,0.5);
    font-style: italic;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-title">100 Days to Save the World</div>
  <div class="header-day">Day <span id="cur-day">1</span> of 100</div>
  <div class="header-stats">
    <div class="stat-pill"><span class="stat-icon">⚔️</span> <span id="stat-hp">HP: 100</span></div>
    <div class="stat-pill"><span class="stat-icon">🍞</span> <span id="stat-food">Food: 10</span></div>
    <div class="stat-pill"><span class="stat-icon">📍</span> <span id="stat-loc">Okuna</span></div>
  </div>
</header>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#8fcc70"></div> Town</div>
  <div class="legend-item"><div class="legend-dot" style="background:#70a8cc"></div> Shop</div>
  <div class="legend-item"><div class="legend-dot" style="background:#ff8080"></div> Boss</div>
  <div class="legend-item"><div class="legend-dot" style="background:#d4a017"></div> Rest</div>
  <div class="legend-item"><div class="legend-dot" style="background:#cc88cc"></div> Recruit</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(212,160,23,0.5); border-color:var(--gold-lt)"></div> Current</div>
</div>

<!-- Map -->
<div class="map-wrapper">
  <div class="road"></div>
  <div id="map-nodes"></div>

  <!-- Final Destination -->
  <div class="dest-node">
    <span class="dest-icon">💀</span>
    <div class="dest-name">Roachak's Throne Room</div>
    <div class="dest-sub">Loc 125 · The Blasted Lands</div>
  </div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detail-panel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div class="detail-id"   id="d-id"></div>
  <div class="detail-name" id="d-name"></div>
  <div class="detail-badges" id="d-badges"></div>
  <div class="detail-text"   id="d-text"></div>
  <div class="detail-random" id="d-random" style="display:none"></div>
  <div class="detail-grid"   id="d-grid"></div>
</div>

<script>
const LOCATIONS = [
  {id:1,  name:"Okuna",                   town:true,  shop:true,  boss:false, bossLvl:null, rest:true,  recruit:null,   mobs:"Small Rats 0%, Spiders 0%",        text:"You stand in the main square of Okuna, the Johloran port city that provides entrance into the rugged Senin Valley. The East Senin Road begins here, as does your glorious journey, which ends at the Blasted Lands, where Roachak schemes to destroy the world. A scheme that will fail once you get your hands on him.", random:["An old shopkeeper with one eye named Crazy Letty looks at you with a scowl and a squint and says \"Yer crazy if you think you'll make it more than two days out there!\"","A city guard walks by and looks at you and your pack. He shakes his head and walks away, laughing.","A drunk, extremely hairy old man named Larry the Lush cheers you on as you face the city gates. Then he hiccups and asks you to remind him where you're going, again."]},
  {id:2,  name:"Okuna Outskirts",         town:true,  shop:false, boss:false, bossLvl:null, rest:true,  recruit:"Rex the Dog", mobs:"Small Rats 10%",            text:"You've reached the outskirts of Okuna, where the bustle of the big port city turns into sprawling villages and the beginnings of the East Senin Road.", random:["A villager loading a cart squints at your pack and says, \"You heading east? Ha. Well, it was nice knowing you, I suppose.\"","An old woman sweeping her stoop pauses to look you over. \"I've seen that look before,\" she says. \"Someone's off to do something foolish.\""]},
  {id:3,  name:"Osiran Fields",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 20%",                     text:"You're greeted by the Osiran Hills, which run to the mountains in the north. Oak trees are scattered across the land, providing cover to camp for the night — or for bandits to hide in.", random:[]},
  {id:4,  name:"Village of Amrik",        town:true,  shop:true,  boss:false, bossLvl:null, rest:true,  recruit:null,   mobs:"Small Rats 0%, Spiders 0%",        text:"The village of Amrik appears to the south from this spot on the East Senin Road. Johloran people wander about, working the fields and gathering water from nearby streams.", random:["A farmer leaning on a fence post watches you pass. \"Road's been rough lately. Seen three travelers go east this month. Haven't seen any come back.\"","A cheerful woman selling bread from a basket offers you a loaf. \"You look like you need feeding up. Heroes always do.\""]},
  {id:5,  name:"Rogan's Field",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Medium Rats 30%",                  text:"The East Senin Road ambles through Rogan's Field, a vast grassy field at the north end of Rogan's Farm.", random:[]},
  {id:6,  name:"Kanlin's House Way Station", town:false, shop:true, boss:false, bossLvl:null, rest:true, recruit:null,  mobs:"Bandits 10%",                       text:"You've reached the way station of Kanlin's House, a raucous pub and inn where travelers come and go from all over the Senin Valley. You're halfway to Disoga now.", random:["A large man at the bar raises his mug in your direction. \"Another fool headed east!\" he bellows. The whole tavern laughs. He winks at you.","A bard in the corner is playing a song called \"The Ballad of the Last Hero.\" It ends badly for the hero. He nods at you when it's over."]},
  {id:7,  name:"The Road to Saba",        town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Bandits 20%",                       text:"A mile marker here points the way to Saba, the former capital of the Johloran Kingdom before the Trohmans took over.", random:[]},
  {id:8,  name:"Arren's Farm",            town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 15%",                     text:"A large swath of corn covers the field south of the road. Arren grows enough corn to feed half the Senin Valley, which makes him one of the wealthiest men in Johlora.", random:["A farmhand pauses his work and calls out, \"Hey! You're not supposed to cut through here!\" Then he looks at your weapons and goes back to work."]},
  {id:9,  name:"Lahonis",                 town:true,  shop:true,  boss:false, bossLvl:null, rest:true,  recruit:"Emmy", mobs:"Small Rats 0%, Spiders 0%",        text:"The city of Lahonis sits on a hilltop to the north, overlooking the East Senin Road as it passes by. Lahonis marks the eastern edge of the Johloran Kingdom.", random:["A border merchant says, \"I don't cross into Qanisi territory anymore. Not since last spring. Things have gotten... weird out there.\"","A city watchman eyes you suspiciously. \"You're headed east? What business you got in Qanisi lands?\" He lets you pass but doesn't look happy about it."]},
  {id:10, name:"Versyg's Hill",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 20%, Bandits 15%",        text:"Versyg's Hill rises gently to the north, offering a sweeping view of the road ahead — and a reminder of how far you still have to go. The wind up here is cold and constant.", random:[]},
  {id:11, name:"Bunt Back Hill",          town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 20%, Bandits 20%",        text:"Bunt Back Hill is an unremarkable lump of rock and scrub that travelers only remember because the road narrows uncomfortably around it. Keep your eyes open.", random:[]},
  {id:12, name:"Archer's Bend",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Bandits 30%",                       text:"You've reached Archer's Bend, where the road veers sharply around a ridge. It's called Archer's Bend because anyone with a bow can pick off unsuspecting travelers.", random:[]},
  {id:13, name:"The Badlands",            town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Bandits 35%, Qanisi Warrior 20%",  text:"The Badlands await — a long stretch of secluded road where unwary travelers have met their doom at the hands of Qimdarra raiders or bandits.", random:[]},
  {id:14, name:"The Badlands",            town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Bandits 35%, Qanisi Warrior 25%",  text:"The East Senin Road continues through a treacherous stretch rife with potential danger.", random:[]},
  {id:15, name:"The Badlands",            town:false, shop:false, boss:true,  bossLvl:10,   rest:false, recruit:null,   mobs:"Bandits 30%, Qanisi Warrior 30%",  text:"The road finally begins to open up, but not before passing through more nooks and crannies in nearby ridges than you can count, each a potential hiding spot for unsavory types.", random:[]},
  {id:16, name:"Sapphire Lake",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 20%, Wolves 15%",         text:"The hilly terrain opens up to flat plains, especially to the southwest where Sapphire Lake gleams.", random:[]},
  {id:17, name:"Sapphire Lake",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wild Dogs 20%, Wolves 20%",         text:"The road hugs the southern edge of Sapphire Lake. The water is still and clear enough to see the bottom. It would be peaceful, if you weren't being followed.", random:[]},
  {id:18, name:"Rocqurk Pass",            town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Qanisi Warrior 30%, Bandits 20%",  text:"The East Senin Road ventures through higher ground. This particular area is known as Rocqurk Pass, named after the vaunted Qimdarra warrior who once defended it against a hundred men.", random:[]},
  {id:19, name:"Zilam",                   town:true,  shop:true,  boss:false, bossLvl:null, rest:false, recruit:"Dain", mobs:"Qanisi Warrior 10%",               text:"Zilam is a small Qanisi town.", random:["A Qanisi elder sitting outside his home watches you with calm, unreadable eyes. He says nothing. After a moment, he nods slightly, as if confirming something to himself.","A young Qanisi woman at the market looks you over curiously. \"Johloran? We don't see many of you this far east. Most are too afraid.\""]},
  {id:20, name:"Red Pine Garden",         town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wolves 20%, Bandits 15%",           text:"The Red Pine Garden is an oddity — a grove of deep crimson pines arranged too deliberately to be natural. No one seems to know who planted them, or why.", random:[]},
  {id:21, name:"Greltin Grove",           town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Wolves 25%, Goblins 20%",           text:"Greltin Grove closes in around the road, the trees older and broader than anything you've seen since leaving the Senin Valley. Something lives in there. Several somethings, probably.", random:[]},
  {id:22, name:"Marblerock",              town:false, shop:false, boss:false, bossLvl:null, rest:false, recruit:null,   mobs:"Bandits 30%, Goblins 20%",          text:"Marblerock is a cluster of pale limestone outcroppings that jut from the hillside like broken teeth. Travelers use it as a landmark. Bandits use it as a blind.", random:[]},

const CURRENT_LOC = 1;

const REGION_BREAKS = [
  { after: 0,   label: "The Johloran Heartlands" },
  { after: 9,   label: "Eastern Frontier" },
  { after: 18,  label: "Qanisi Territory" },
  { after: 30,  label: "The Wilds" },
  { after: 55,  label: "The Dark Reaches" },
  { after: 99,  label: "The Blasted Approach" },
  { after: 120, label: "The End of the World" },
];

function getBadges(loc) {
  const b = [];
  if (loc.town) b.push('<span class="badge badge-town">⛪ Town</span>');
  if (loc.shop) b.push('<span class="badge badge-shop">🛒 Shop</span>');
  if (loc.rest) b.push('<span class="badge badge-rest">🛏 Rest</span>');
  if (loc.recruit) b.push('<span class="badge badge-recruit">👤 Recruit</span>');
  if (loc.boss) b.push(`<span class="badge badge-boss">💀 Boss${loc.bossLvl ? ' Lv'+loc.bossLvl : ''}</span>`);
  return b.join('');
}

function buildMap() {
  const container = document.getElementById('map-nodes');
  let regionIdx = 0;
  let side = 'left';

  LOCATIONS.forEach((loc, i) => {
    // Region label
    while (regionIdx < REGION_BREAKS.length && loc.id > REGION_BREAKS[regionIdx].after) {
      const rl = document.createElement('div');
      rl.className = 'region-label';
      rl.textContent = REGION_BREAKS[regionIdx].label;
      container.appendChild(rl);
      regionIdx++;
    }

    const isVisited = loc.id < CURRENT_LOC;
    const isCurrent = loc.id === CURRENT_LOC;
    const isLocked  = loc.id > CURRENT_LOC + 3;

    const row = document.createElement('div');
    row.className = `loc-row ${side}`;
    row.style.animationDelay = (i * 0.02) + 's';

    let dotColor = 'rgba(184,134,11,0.3)';
    if (isCurrent)  dotColor = 'var(--gold-lt)';
    if (loc.boss)   dotColor = isLocked ? 'rgba(139,26,26,0.3)' : '#cc3333';
    if (loc.town && !loc.boss) dotColor = isLocked ? 'rgba(58,92,42,0.3)' : '#5a9c44';

    row.innerHTML = `
      <div class="loc-spacer"></div>
      <div class="loc-connector"></div>
      <div class="road-dot" style="background:${dotColor};border-color:${dotColor}"></div>
      <div class="loc-connector"></div>
      <div class="loc-card ${isCurrent?'current':''} ${isVisited?'visited':''} ${isLocked?'locked':''}"
           onclick="${isLocked?'':'openDetail('+loc.id+')'}">
        <div class="loc-id">LOC ${String(loc.id).padStart(3,'0')}</div>
        <div class="loc-name">${loc.name}</div>
        <div class="loc-badges">${getBadges(loc)}</div>
        <div class="loc-mobs">${loc.mobs}</div>
      </div>
      <div class="loc-spacer"></div>
    `;
    container.appendChild(row);
    side = side === 'left' ? 'right' : 'left';
  });

  // Flush any remaining region labels
  while (regionIdx < REGION_BREAKS.length) {
    const rl = document.createElement('div');
    rl.className = 'region-label';
    rl.textContent = REGION_BREAKS[regionIdx].label;
    container.appendChild(rl);
    regionIdx++;
  }
}

function openDetail(id) {
  const loc = LOCATIONS.find(l => l.id === id);
  if (!loc) return;
  document.getElementById('d-id').textContent = `LOCATION ${String(id).padStart(3,'0')}`;
  document.getElementById('d-name').textContent = loc.name;
  document.getElementById('d-badges').innerHTML = getBadges(loc);
  document.getElementById('d-text').textContent = loc.text || '';

  const randEl = document.getElementById('d-random');
  if (loc.random && loc.random.length) {
    const pick = loc.random[Math.floor(Math.random() * loc.random.length)];
    randEl.textContent = pick;
    randEl.style.display = 'block';
  } else {
    randEl.style.display = 'none';
  }

  const stats = [];
  if (loc.mobs) stats.push({label:'Encounters', val: loc.mobs});
  if (loc.recruit) stats.push({label:'Possible Recruit', val: loc.recruit});
  if (loc.bossLvl) stats.push({label:'Boss Level', val: loc.bossLvl});

  document.getElementById('d-grid').innerHTML = stats.map(s =>
    `<div class="detail-stat"><div class="detail-stat-label">${s.label}</div><div class="detail-stat-val">${s.val}</div></div>`
  ).join('');

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// Close on backdrop click
document.addEventListener('click', e => {
  const panel = document.getElementById('detail-panel');
  if (panel.classList.contains('open') && !panel.contains(e.target)) {
    closeDetail();
  }
});

buildMap();

// Scroll to current location
setTimeout(() => {
  const cards = document.querySelectorAll('.loc-card.current');
  if (cards.length) cards[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 200);
</script>
